<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FLUX — Film & Serije</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  
  <div class="ambient" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  
  <header class="header">
    <div class="logo">
      <span class="logo-f">FLU</span><span class="logo-x">X</span>
    </div>
    <nav class="tabs">
      <button class="tab active" data-cat="filmovi">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M7 2v20M17 2v20M2 12h20M2 7h5M2 17h5M17 7h5M17 17h5"/></svg>
        Filmovi
      </button>
      <button class="tab" data-cat="serije">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><path d="M16 2l-4 5-4-5"/></svg>
        Serije
      </button>
      <button class="tab" data-cat="dokumentarci">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        Dokumentarci
      </button>
    </nav>
  </header>

 
  <section class="hero-strip">
    <h1 class="hero-title" id="hero-title">Filmovi</h1>
    <div class="hero-line" id="hero-line"></div>
    <p class="hero-sub" id="hero-sub">Top 20 · IMDb ocjena</p>
  </section>


  <main class="gallery" id="gallery"></main>


  <div class="modal-overlay" id="overlay">
    <div class="modal" id="modal">
      <button class="close-btn" id="close-btn" aria-label="Zatvori">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div class="modal-body">
        <div class="modal-left">
          <div class="poster-wrap">
            <img id="m-poster" src="" alt="" />
            <div class="poster-shine"></div>
          </div>
          <div class="rating-pill" id="m-rating-pill">
            <span class="star">★</span>
            <span id="m-rating"></span>
          </div>
        </div>
        <div class="modal-right">
          <div class="m-category" id="m-cat"></div>
          <h2 class="m-title" id="m-title"></h2>
          <div class="m-meta">
            <span id="m-year"></span>
            <span class="dot">·</span>
            <span id="m-dur"></span>
            <span class="dot">·</span>
            <span id="m-dir"></span>
          </div>
          <p class="m-desc" id="m-desc"></p>
          <div class="m-genres" id="m-genres"></div>
          <div class="m-stats">
            <div class="m-stat"><div class="m-stat-val" id="ms-rating"></div><div class="m-stat-lbl">IMDb</div></div>
            <div class="m-stat"><div class="m-stat-val" id="ms-year"></div><div class="m-stat-lbl">Godina</div></div>
            <div class="m-stat"><div class="m-stat-val" id="ms-dur"></div><div class="m-stat-lbl">Trajanje</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
