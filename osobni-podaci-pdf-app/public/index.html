<!DOCTYPE html>
<html lang="hr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generiranje PDF-a</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>Forma za osobne podatke</h1>
      <p>Unesi podatke i klikni gumb za generiranje PDF dokumenta.</p>

      <form action="/generate-pdf" method="POST" class="form">
        <div class="grid">
          <label>
            Ime *
            <input type="text" name="ime" required placeholder="npr. Vedrana" />
          </label>

          <label>
            Prezime *
            <input type="text" name="prezime" required placeholder="npr. Šiško" />
          </label>

          <label>
            Datum rođenja
            <input type="date" name="datumRodenja" />
          </label>

          <label>
            OIB
            <input type="text" name="oib" maxlength="11" placeholder="11 znamenki" />
          </label>

          <label>
            Email *
            <input type="email" name="email" required placeholder="ime@email.com" />
          </label>

          <label>
            Telefon
            <input type="tel" name="telefon" placeholder="+385..." />
          </label>

          <label>
            Adresa
            <input type="text" name="adresa" placeholder="Ulica i kućni broj" />
          </label>

          <label>
            Grad
            <input type="text" name="grad" placeholder="npr. Zagreb" />
          </label>
        </div>

        <label>
          Napomena
          <textarea name="napomena" rows="4" placeholder="Dodatna napomena..."></textarea>
        </label>

        <button type="submit">Generiraj PDF</button>
      </form>
    </section>
  </main>
</body>
</html>
